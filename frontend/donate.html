<!DOCTYPE html>
<html>

<head>

  <title>FoodBridge</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="overlay">

    <div class="container">
      <div class="hero">
        <h1>Donate Food. Save Lives.</h1>

        <p class="tagline">
          A small act of kindness can feed someone in need
        </p>
      </div>

      <div class="card" style="background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); color: white; margin-bottom: 20px; border: none; text-align: left; padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h3 style="margin: 0; font-size: 18px;">🥗 Is your food fresh?</h3>
            <p style="margin: 5px 0 0 0; font-size: 13px; opacity: 0.9;">Verify quality with our AI tool before donating.</p>
          </div>
          <a href="freshness.html" onclick="saveFormState()" style="text-decoration: none;">
            <button style="width: auto; background: white; color: #27ae60; padding: 8px 15px; margin: 0; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">Check Now →</button>
          </a>
        </div>
      </div>

      <div class="card">

        <form id="foodForm">

          <div class="typeSelector">

            <label>
              <input type="radio" name="type" value="Veg" checked>
              🍀 Veg
            </label>

            <label>
              <input type="radio" name="type" value="NonVeg">
              🍗 Non-Veg
            </label>

          </div>

          <input type="text" id="donorName" placeholder="Donor Name" required>

          <input type="text" id="foodName" placeholder="Food Name" required>

          <div style="display: flex; gap: 10px; margin-bottom: 15px;">
  <input type="number" id="quantity" placeholder="Quantity" required style="margin-bottom: 0; flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
  <select id="quantityUnit" required style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; background: white; font-size: 16px; width: 120px;">
    <option value="Servings">Servings</option>
    <option value="kg">kg</option>
    <option value="g">grams</option>
    <option value="L">Litres</option>
    <option value="Packets">Packets</option>
    <option value="Items">Items</option>
  </select>
</div>

          <input type="datetime-local" id="expiryTime" required>

          <input type="text" id="area" placeholder="Area/Landmark" required>

          <input type="text" id="location" placeholder="City" required>

          <input type="text" id="contact" placeholder="Contact Number" required>

          <input type="email" id="mail" placeholder="Email ID(required)" required>
          <button type="submit">Donate Food</button>

        </form>

      </div>
      <div class="card" style="margin-top: 40px; text-align: left;">
        <h2 style="color: #28a745;">💖 Impact Wall</h2>
        <p style="color: #666; margin-bottom: 20px;">See what our wonderful donors have contributed recently.</p>
        <div id="donatedList" style="display: flex; flex-direction: column; gap: 15px;">
           <!-- Donated items will go here -->
        </div>
      </div>

    </div>

  </div>

  <script>

    document.getElementById("foodForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const isFreshnessApproved = sessionStorage.getItem("foodFreshnessApproved");
      if (isFreshnessApproved !== "true") {
        alert("Please verify your food's freshness using our AI tool before donating. Click the 'Check Now →' button above.");
        return;
      }

      const type = document.querySelector('input[name="type"]:checked').value;

      const area = document.getElementById("area").value;
      const location = document.getElementById("location").value;

      const fullAddress = encodeURIComponent(area + ", " + location + ", India");

      const geoResponse = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${fullAddress}`
      );

      const geoData = await geoResponse.json();

      let lat = 0;
      let lng = 0;

      if (geoData.length > 0) {
        lat = geoData[0].lat;
        lng = geoData[0].lon;
      }
      else {
        console.log("Geocoding failed, using default");
        lat = 0;
        lng = 0;
      }

      console.log("LAT LNG:", lat, lng);

      const address = area + ", " + location;
      const food = {
        type: type,
        donorName: document.getElementById("donorName").value,
        foodName: document.getElementById("foodName").value,
        quantity: document.getElementById("quantity").value + " " + document.getElementById("quantityUnit").value,
        expiryTime: document.getElementById("expiryTime").value,
        area: area,
        location: location,
        address: address,
        contact: document.getElementById("contact").value,
        email: document.getElementById("mail").value,
        lat: lat,
        lng: lng


      };

      await fetch("http://localhost:5000/add-food", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(food)
      });

      sessionStorage.removeItem("foodFreshnessApproved");
      sessionStorage.removeItem("donationFormState");
      alert("Food donated successfully!");
      window.location.href = "index.html";

    });

    function saveFormState() {
      const state = {
        donorName: document.getElementById("donorName").value,
        foodName: document.getElementById("foodName").value,
        quantity: document.getElementById("quantity").value,
        quantityUnit: document.getElementById("quantityUnit").value,
        expiryTime: document.getElementById("expiryTime").value,
        area: document.getElementById("area").value,
        location: document.getElementById("location").value,
        contact: document.getElementById("contact").value,
        mail: document.getElementById("mail").value,
        type: document.querySelector('input[name="type"]:checked').value
      };
      sessionStorage.setItem("donationFormState", JSON.stringify(state));
    }

    function loadFormState() {
      const saved = sessionStorage.getItem("donationFormState");
      if (saved) {
        const state = JSON.parse(saved);
        document.getElementById("donorName").value = state.donorName || "";
        document.getElementById("foodName").value = state.foodName || "";
        document.getElementById("quantity").value = state.quantity || "";
        document.getElementById("quantityUnit").value = state.quantityUnit || "Servings";
        document.getElementById("expiryTime").value = state.expiryTime || "";
        document.getElementById("area").value = state.area || "";
        document.getElementById("location").value = state.location || "";
        document.getElementById("contact").value = state.contact || "";
        document.getElementById("mail").value = state.mail || "";

        const radio = document.querySelector(`input[name="type"][value="${state.type}"]`);
        if (radio) radio.checked = true;
      }
    }

    async function loadDonatedFoods() {
      try {
        const response = await fetch("http://localhost:5000/donated-foods");
        if (!response.ok) return;
        const foods = await response.json();
        const container = document.getElementById("donatedList");
        container.innerHTML = "";
        
        if (foods.length === 0) {
          container.innerHTML = "<p>No donations fully claimed yet. Be the first!</p>";
        }

        foods.forEach(food => {
          const item = document.createElement("div");
          item.style.padding = "15px";
          item.style.border = "1px solid #e0e0e0";
          item.style.borderRadius = "8px";
          item.style.background = "#f9fff9";
          
          item.innerHTML = `
            <h3 style="margin-top: 0; color: #28a745; margin-bottom: 5px;">✅ ${food.foodName} (Donated completely)</h3>
            <p style="margin: 5px 0; color: #444;"><b>Hero Donor:</b> ${food.donorName}</p>
            <p style="margin: 5px 0; color: #666; font-size: 14px;">📍 ${food.area}, ${food.location}</p>
          `;
          container.appendChild(item);
        });
      } catch (err) {
        console.log("Error loading donated foods", err);
      }
    }
    
    window.onload = () => {
      loadFormState();
      loadDonatedFoods();
    };

  </script>

</body>

</html>
